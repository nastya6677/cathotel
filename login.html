<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🐾 МурррОтель</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="rooms.html">Номера</a>
            <a href="booking.html">Бронировать</a>
            <a href="reviews.html">Отзывы</a>
            <a href="profile.html">Профиль</a>
        </nav>
        <div id="authStatus"></div>
    </header>

    <main style="max-width:500px;margin:2rem auto;padding:2rem;background:white;border-radius:32px;">
        <div id="loginForm">
            <h2>Вход</h2>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Пароль" required>
            <button onclick="doLogin()">Войти</button>
            <p style="margin-top:1rem;">Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
        </div>
        
        <div id="registerForm" style="display:none;">
            <h2>Регистрация</h2>
            <input type="text" id="regName" placeholder="Ваше имя" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="tel" id="regPhone" placeholder="Телефон" required>
            <input type="password" id="regPassword" placeholder="Пароль" required>
            <button onclick="doRegister()">Зарегистрироваться</button>
            <p style="margin-top:1rem;"><a href="#" onclick="showLogin()">Уже есть аккаунт? Войти</a></p>
        </div>
    </main>

    <footer>© МурррОтель — забота как дома</footer>
    <div id="cat-helper"></div>
    
    <script src="script.js"></script>
    <script>
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await loginUser(email, password);
                showToast('Успешный вход!');
                window.location.href = 'profile.html';
            } catch(e) {
                showToast(e.message, true);
            }
        }
        
        async function doRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            try {
                await registerUser(email, password, name, phone);
                showToast('Регистрация успешна! Теперь войдите');
                showLogin();
            } catch(e) {
                showToast(e.message, true);
            }
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }
    </script>
    <script src="cat-helper.js"></script>
</body>
</html>
